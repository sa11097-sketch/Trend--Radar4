# ═══════════════════════════════════════════════════════════════
#                TrendRadar 专业金融/省流版 (针对 Gemini 优化)
# ═══════════════════════════════════════════════════════════════

app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: true
  preset: "morning_evening"

# 平台源更新：移除财联社，加入路透，雅虎转为爬虫模式
platforms:
  enabled: true
  sources:
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
      expected_domain: "wallstreetcn.com"
    - id: "cnbc"
      name: "CNBC"
      expected_domain: "cnbc.com"
    - id: "caixin"
      name: "财新网"
      expected_domain: "caixin.com"
    - id: "financial-times"
      name: "金融时报"
      expected_domain: "ft.com"
    - id: "reuters"
      name: "路透社"
      expected_domain: "reuters.com"
    - id: "yahoo-finance"
      name: "雅虎财经"
      expected_domain: "finance.yahoo.com"

# RSS 已关闭，全部由平台爬虫接管
rss:
  enabled: false

report:
  mode: "incremental"
  display_mode: "keyword"

filter:
  method: "ai"
  priority_sort_enabled: true

ai_filter:
  batch_size: 60              # 限制单批次 Token[cite: 3]
  min_score: 0.7              # 高门槛过滤

display:
  region_order:
    - ai_analysis
    - hotlist
    - rss
  regions:
    hotlist: true
    new_items: true
    rss: false
    ai_analysis: true

# AI 与模型配置[cite: 3]
ai:
  model: "gemini/gemini-2.5-flash"
  api_key: "" 
  max_tokens: 2000            # 限制输出上限[cite: 3]
  temperature: 0.7

ai_analysis:
  enabled: true
  mode: "incremental"
  max_news_for_analysis: 60   # 关键省流设置[cite: 3]
  include_rss: false          # RSS 已关闭
  include_standalone: true
  include_rank_timeline: false # 关闭轨迹追踪以节约 Token[cite: 3]

ai_translation:
  enabled: true
  scope:
    hotlist: false            # 关闭热榜翻译以省 Token[cite: 3]
    rss: false
    standalone: true

advanced:
  crawler:
    request_interval: 3000
